  <g fill="#d28db0" opacity="0.4">
    <ellipse cx="160" cy="170" rx="20" ry="52" transform="rotate(-24 160 170)" />
    <ellipse cx="640" cy="170" rx="20" ry="52" transform="rotate(24 640 170)" />
