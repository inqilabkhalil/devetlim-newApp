<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Bahar Zerafeti Preview</title>
  <desc id="desc">Soft botanical invitation preview card.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f5ee" />
      <stop offset="100%" stop-color="#efe7d6" />
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d5b56b" />
      <stop offset="100%" stop-color="#b7933c" />
    </linearGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#bg)" />

  <circle cx="400" cy="350" r="170" fill="#ffffff" opacity="0.96" />
  <circle cx="400" cy="350" r="170" fill="none" stroke="url(#ring)" stroke-width="3" />

  <g fill="#6a8a58" opacity="0.9">
    <ellipse cx="180" cy="220" rx="22" ry="14" transform="rotate(-35 180 220)" />
    <ellipse cx="150" cy="265" rx="20" ry="13" transform="rotate(-20 150 265)" />
    <ellipse cx="130" cy="315" rx="18" ry="12" transform="rotate(-15 130 315)" />
    <ellipse cx="620" cy="220" rx="22" ry="14" transform="rotate(35 620 220)" />
    <ellipse cx="650" cy="265" rx="20" ry="13" transform="rotate(20 650 265)" />
    <ellipse cx="670" cy="315" rx="18" ry="12" transform="rotate(15 670 315)" />
  </g>

  <text x="400" y="330" text-anchor="middle" font-size="64" font-family="Georgia, serif" fill="#b7933c">S &amp; L</text>
  <text x="400" y="390" text-anchor="middle" font-size="24" font-family="Arial, sans-serif" letter-spacing="6" fill="#6f6a5e">DEVETNAME</text>

  <text x="400" y="700" text-anchor="middle" font-size="46" font-family="Georgia, serif" fill="#4a4a43">Bahar Zerafeti</text>
  <text x="400" y="745" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#7d766a">Toy devetnamesi</text>

  <rect x="250" y="790" width="300" height="2" fill="#c8a95a" opacity="0.8" />
</svg>
